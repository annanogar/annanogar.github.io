{% macro regular(title = '', subtitle = '', subtitle_2 = '') %}
  {% if title %}
    <div class="article-header">
      <div class="article-header__wrapper">
        <h1 class="article-header__title">{{ title }}</h1>

        {% if subtitle %}
          <p class="article-header__subtitle">{{ subtitle }}</p>
        {% endif %}

        {% if subtitle_2 %}
          <p class="article-header__subtitle">{{ subtitle_2 }}</p>
        {% endif %}
      </div>
    </div>
  {% endif %}
{% endmacro %}
